<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative Portfolio</title>
    <!-- GSAP & ScrollTrigger CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <style>
        /* Reset margin & padding */
        body, html {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            background-color: #ffffff; /* Background hitam murni */
        }
        
        /* Container scroll horizontal (14 slide = 1400vw) */
        .portfolio-container {
            display: flex;
            flex-wrap: nowrap;
            width: 1400vw; 
            height: 100vh;
        }
        
        /* Set section sebesar layar viewport */
        .section {
            width: 100vw;
            height: 100vh;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Set gambar menyesuaikan ukuran 1920x1080 dengan sempurna */
        .section img {
            width: 100%;
            height: 100%;
            aspect-ratio: 16 / 9; /* Mengunci rasio persis di 1920x1080 */
            object-fit: contain; /* Memastikan tidak ada yang terpotong */
            display: block;
        }
    </style>
</head>
<body>

    <main class="portfolio-container" id="portfolio">
        <!-- 1. Opening -->
        <section class="section">
            <img src="Opening.jpg" alt="Opening">
        </section>

        <!-- 2. About Me -->
        <section class="section">
            <img src="Aboutme.jpg" alt="About Me">
        </section>

        <!-- 3. Experience -->
        <section class="section">
            <img src="Experience.jpg" alt="Experience">
        </section>

        <!-- 4. Table of Contents -->
        <section class="section">
            <img src="Table of contents.jpg" alt="Table of contents">
        </section>

        <!-- 5. Social Media Admin -->
        <section class="section">
            <img src="social media admin.jpg" alt="Social Media Admin">
        </section>

        <!-- 6. Tau ah capek -->
        <section class="section">
            <img src="tau ah capek.jpg" alt="Tau ah capek">
        </section>

        <!-- 7. Graphic Design -->
        <section class="section">
            <img src="graphic design.jpg" alt="Graphic Design">
        </section>

        <!-- 8. Graphic Design Isi -->
        <section class="section">
            <img src="graphic design isi.jpg" alt="Graphic Design Isi">
        </section>

        <!-- 9. Personal Project -->
        <section class="section">
            <img src="personal project.jpg" alt="Personal Project">
        </section>

        <!-- 10. 1080 x 1080 -->
        <section class="section">
            <img src="1080x1080.jpg" alt="1080x1080">
        </section>

        <!-- 11. 1080 x 1920 -->
        <section class="section">
            <img src="1080 x 1920.jpg" alt="1080x1920">
        </section>

        <!-- 12. Motion Graphic -->
        <section class="section">
            <img src="motion graphic .jpg" alt="Motion Graphic">
        </section>

        <!-- 13. Frame -->
        <section class="section">
            <img src="frame.jpg" alt="Frame">
        </section>

        <!-- 14. Closing -->
        <section class="section">
            <img src="closing.jpg" alt="Closing">
        </section>
    </main>

    <script>
        // Setup GSAP untuk horizontal scroll
        gsap.registerPlugin(ScrollTrigger);

        const sections = gsap.utils.toArray(".section");

        gsap.to(sections, {
            xPercent: -100 * (sections.length - 1),
            ease: "none",
            scrollTrigger: {
                trigger: "#portfolio",
                pin: true,
                scrub: 1, 
                snap: 1 / (sections.length - 1),
                end: () => "+=" + document.querySelector(".portfolio-container").offsetWidth
            }
        });
    </script>
</body>
</html>
